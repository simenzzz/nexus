# Production override. Layered on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from dev:
#   - Caddy reverse proxy fronts everything; only Caddy publishes host ports.
#   - All services run read-only with all caps dropped and no-new-privileges.
#   - Resource limits and tighter logging.
#
# Secrets are loaded via the inherited `env_file: .env` from
# docker-compose.yml. For a true secrets-store deploy, switch JWT_SECRET and
# SURREAL_PASS to Docker secrets here (`secrets:` block + JWT_SECRET_FILE
# env + a tiny read-from-file shim in config.rs). Today, the operator is
# responsible for restricting access to the .env file on the host.
#
# Required environment variables on the host (`.env` for compose):
#   DOMAIN, NEXUS_ENV=production, JWT_SECRET (>=32 chars, not placeholder),
#   SURREAL_USER, SURREAL_PASS (>=16 chars, not 'root'),
#   REDIS_PASSWORD, ACME_EMAIL.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - server
      - client
    cap_drop: [ALL]
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-admin@${DOMAIN}}

  surrealdb:
    restart: always
    # Reset dev host-port publishing; Caddy is the only public ingress.
    ports: !reset []
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  redis:
    restart: always
    ports: !reset []
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  server:
    image: ${SERVER_IMAGE:-nexus-server:latest}
    restart: always
    ports: !reset []
    environment:
      NEXUS_ENV: production
      SECURE_COOKIES: "true"
      RUST_LOG: info
      CORS_ORIGIN: https://${DOMAIN}
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.00"

  client:
    image: ${CLIENT_IMAGE:-nexus-client:latest}
    restart: always
    ports: !reset []
    environment:
      # Empty values force the browser client to use same-origin /api and /ws.
      PUBLIC_API_URL: ""
      PUBLIC_WS_URL: ""
      NODE_ENV: production
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"

volumes:
  caddy-data:
  caddy-config:
